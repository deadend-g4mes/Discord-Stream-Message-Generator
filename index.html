<!DOCTYPE html>
<html>
  
    <head>
        
        <meta charset="utf-8" />
            
        <meta name="viewport" content="width=device-width,initial-scale=1" />
            
        <title>Stream Discord Schedule Builder</title>
            
        <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
            
        <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    
    </head>
    
    <body>

        <h1>Stream Schedule Discord Message Builder</h1>

        <h2>Select the monday of the week you're planning your schedule for. If not streaming on a certian day, type 'Offline'.</h2>

        <div id="feedback"></div>

        <div>
            <label>Week:</label>
            <input type="date" id="week">
            <button id="submit">Submit</button>
        </div>

        <div>
            <label>Monday:</label>
            <input type="text" id="title1">
            <input type="time" id="time1">
        </div>
        <div>
            <label>Tuesday:</label>
            <input type="text" id="title2">
            <input type="time" id="time2">
        </div>
        <div>
            <label>Wednesday:</label>
            <input type="text" id="title3">
            <input type="time" id="time3">
        </div>
        <div>
            <label>Thursday:</label>
            <input type="text" id="title4">
            <input type="time" id="time4">
        </div>
        <div>
            <label>Friday:</label>
            <input type="text" id="title5">
            <input type="time" id="time5">
        </div>
        <div>
            <label>Saturday:</label>
            <input type="text" id="title6">
            <input type="time" id="time6">
        </div>
        <div>
            <label>Sunday:</label>
            <input type="text" id="title7">
            <input type="time" id="time7">
        </div>


        <button id="continue">Print Schedule</button>
            
        <div id="output"></div>
        
        <script type="py" src="./main.py" config="./pyscript.toml"></script>
    
        </body>
</html>
