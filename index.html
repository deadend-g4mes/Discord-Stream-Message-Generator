<!DOCTYPE html>
<html>
  
    <head>
        
        <meta charset="utf-8" />
            
        <meta name="viewport" content="width=device-width,initial-scale=1" />
            
        <title>Stream Discord Schedule Builder</title>
            
        <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
            
        <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    
    </head>
    
    <body>

        <h1>Stream Schedule Discord Message Builder</h1>

        <h2>Start with the Monday of the week you're building the Schedule For ex: 4-13-2026 3:00. Be sure to use military time and dashes instead of slashes for the date.</h2>

        <div id="response"> </div>
        
        <input type="text" id="title-input" placeholder="Stream Title Here (Offline if no stream)" />
        <input type="text" id="time-input" placeholder="ex: 4-12-2026 5:00 / 4-12-2026 17:00" />
        
        <button id="continue">Continue</button>
            
        <div id="output"></div>
        
        <script type="py" src="./main.py" config="./pyscript.toml"></script>
    
        </body>
</html>
